[pytest]
asyncio_mode = auto
# Session-scoped, not the default per-function, event loop: app.database.base
# creates its async engine (and asyncpg connection pool) once at import time.
# asyncpg connections are bound to the event loop that created them and are
# not safely reusable from a different one — a per-function loop (the
# pytest-asyncio default) causes the first DB-touching test in a run to pass
# and every subsequent one to silently fail to connect, since the pool is
# still holding connections tied to a loop that no longer exists.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
